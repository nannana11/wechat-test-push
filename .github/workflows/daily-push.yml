name: Daily Push

on:
  schedule:
    - cron: '00 0 * * *'  # 北京时间每天14:25
  workflow_dispatch:  # 允许手动触发

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Java环境
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Maven打包
        run: mvn clean package

      - name: 执行微信推送
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
          WECHAT_OPENID: ${{ secrets.WECHAT_OPENID }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}  # 【新增】天气API Key
        run: java -jar target/wechat-push-1.0-SNAPSHOT-jar-with-dependencies.jar
